<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3 - Absolute</title>
  <style type="text/css">
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      color: #FFF;
      text-align: center;
      line-height: 24px;
      margin: 0;
      min-height: 100vh;
      position: relative;
    }

    #wrapper {
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 600px;
      height: 140px;
      margin-right: auto;
      margin-left: auto;
      position: relative;
      text-shadow: 2px 2px #000;
    }

    #navy {
      background-color: #001f3f;
    }

    #teal {
      background-color: #39CCCC;
    }

    #blue {
      background-color: #0074D9;
    }

    #aqua {
      background-color: #7FDBFF;
    }

    #footer {
      background-color: #666;
    }

    h1 {
      color: #000;
      font-weight: normal;
      padding: 50px;
    }

    /* Exercise 3 Required: Absolute */

    #navy,
    #teal,
    #blue,
    #aqua {
      width: 110px;
      height: 110px;
      position: fixed;
    }

    #navy {
      top: 0;
      left: 0;
    }

    #teal {
      top: 0;
      right: 0;
    }

    #blue {
      bottom: 0;
      left: 0;
    }

    #aqua {
      bottom: 0;
      right: 0;
    }

    #footer {
      width: 110px;
      height: 110px;
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>
  <h1>Exercise 3 - Absolute</h1>

  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Footer</div>
  </section>
</body>

</html>
